syntax = "proto3";

package yolo;

// YOLO 推理服务
service YoloInference {
  // 单帧推理
  rpc Infer(ImageData) returns (DetectionResult);
  
  // 流式推理 (用于视频流)
  rpc InferStream(stream ImageData) returns (stream DetectionResult);
  
  // 健康检查
  rpc Health(HealthRequest) returns (HealthResponse);
}

// 图像数据
message ImageData {
  int32 width = 1;      // 图像宽度
  int32 height = 2;     // 图像高度
  bytes data = 3;       // RGB 原始数据 (width * height * 3)
  string format = 4;    // "rgb" or "bgr"
}

// 检测结果
message DetectionResult {
  repeated BoundingBox boxes = 1;
  float inference_time_ms = 2;  // 推理耗时
}

// 边界框
message BoundingBox {
  float x1 = 1;        // 左上角 x
  float y1 = 2;        // 左上角 y
  float x2 = 3;        // 右下角 x
  float y2 = 4;        // 右下角 y
  float confidence = 5;  // 置信度
  int32 class_id = 6;    // 类别 ID
  string class_name = 7; // 类别名称
}

// 健康检查请求
message HealthRequest {
  string service = 1;
}

// 健康检查响应
message HealthResponse {
  bool healthy = 1;
  string message = 2;
  string engine_info = 3;  // 引擎信息
}
