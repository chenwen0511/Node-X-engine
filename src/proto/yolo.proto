syntax = "proto3";

package yolo;

// YOLO 推理服务
service YoloInference {
  // 方案 A: Shared Memory 方式 (推荐)
  rpc Infer(InferRequest) returns (DetectionResult);
  
  // 方案 B: 直接传数据 (保留兼容)
  rpc InferRaw(ImageData) returns (DetectionResult);
  
  // 流式推理
  rpc InferStream(stream InferRequest) returns (stream DetectionResult);
  
  // 健康检查
  rpc Health(HealthRequest) returns (HealthResponse);
}

// 方案 A: 通过 Shared Memory 传输 (Zero-Copy)
message InferRequest {
  string buffer_name = 1;    // 共享内存名称 (如 "yolo_image_buffer")
  int32 width = 2;           // 图像宽度
  int32 height = 3;          // 图像高度
  string format = 4;         // "rgb" or "bgr"
}

// 直接传输图像数据 (方案 B)
message ImageData {
  int32 width = 1;
  int32 height = 2;
  bytes data = 3;
  string format = 4;
}

// 检测结果
message DetectionResult {
  repeated BoundingBox boxes = 1;
  float inference_time_ms = 2;
}

// 边界框
message BoundingBox {
  float x1 = 1;
  float y1 = 2;
  float x2 = 3;
  float y2 = 4;
  float confidence = 5;
  int32 class_id = 6;
  string class_name = 7;
}

// 健康检查
message HealthRequest {
  string service = 1;
}

message HealthResponse {
  bool healthy = 1;
  string message = 2;
  string engine_info = 3;
}
